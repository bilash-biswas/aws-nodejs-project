services:
  backend:
    image: ${DOCKER_IMAGE_BACKEND:-backend_image_placeholder}
    container_name: user-crud-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}

  frontend:
    image: ${DOCKER_IMAGE_FRONTEND:-frontend_image_placeholder}
    container_name: user-crud-frontend
    restart: always
    ports:
      - "80:80"
